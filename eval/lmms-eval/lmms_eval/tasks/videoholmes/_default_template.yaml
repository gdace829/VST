dataset_path: anno/eval/VideoHolmes
dataset_kwargs:
  cache_dir: anno/eval/VideoHolmes
  token: True
  video: True
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false

output_type: generate_until
doc_to_visual: !function utils.video_holmes_doc_to_visual
doc_to_text: !function utils.video_holmes_doc_to_text
doc_to_target: "answer"
process_results: !function utils.video_holmes_process_results
metric_list:
  - metric: video_holmes_accuracy
    aggregation: !function utils.video_holmes_aggregate_results
    higher_is_better: true


